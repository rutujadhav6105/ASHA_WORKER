<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHA Seva Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        .stat-card.blue { border-left-color: #667eea; }
        .stat-card.green { border-left-color: #48bb78; }
        .stat-card.orange { border-left-color: #f6ad55; }
        .stat-card.red { border-left-color: #f56565; }
        .stat-card.purple { border-left-color: #9f7aea; }
        .stat-card.pink { border-left-color: #ed64a6; }
        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }
        .info-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .info-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .info-list {
            list-style: none;
        }
        .info-list li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-list li:last-child {
            border-bottom: none;
        }
        .info-list .label {
            color: #666;
            font-size: 14px;
        }
        .info-list .value {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 40px 0;
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 ASHA Seva Dashboard</h1>
            <p>Real-time health worker activity & beneficiary statistics</p>
        </div>

        <div id="content" class="loading">Loading dashboard data...</div>
    </div>

    <script>
        const token = localStorage.getItem('authToken') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJmcmVzaCI6ZmFsc2UsImlhdCI6MTc4MDUwMjg5OCwianRpIjoiM2NkNjg5MTEtMzY0Yi00NjRkLWE3MzktOTRmYWE1ZTA0NjRhIiwidHlwZSI6ImFjY2VzcyIsInN1YiI6IjNlM2Q0NjdjLWU5ZWEtNGExOC05N2VjLWUxOGIwZjNhYTc4NSIsIm5iZiI6MTc4MDUwMjg5OCwiY3NyZiI6IjE4ZDc3YTAyLTkyYWMtNDc1Zi05ZjFjLWI0NGQzYWQ3YjE5YSIsImV4cCI6MTc4MDUwNjQ5OH0.WkjuxDLs0hzqdzi2kUcDMFb1L9jX1ZbhW6hSlMK9H2M';

        async function loadDashboard() {
            try {
                const response = await fetch('http://localhost:5000/api/reports/dashboard', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.message || 'Failed to load dashboard');
                }

                displayDashboard(result.data);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">⚠️ Error loading dashboard: ${error.message}</div>`;
            }
        }

        function displayDashboard(data) {
            const html = `
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <div class="stat-label">👩‍⚕️ ASHA Workers</div>
                        <div class="stat-value">${data.total_asha_workers}</div>
                    </div>
                    <div class="stat-card purple">
                        <div class="stat-label">👨‍💼 Supervisors</div>
                        <div class="stat-value">${data.total_supervisors}</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-label">👨‍👩‍👧‍👦 Families</div>
                        <div class="stat-value">${data.total_families}</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-label">👥 Family Members</div>
                        <div class="stat-value">${data.total_family_members}</div>
                    </div>
                    <div class="stat-card pink">
                        <div class="stat-label">👶 Children</div>
                        <div class="stat-value">${data.total_children}</div>
                    </div>
                    <div class="stat-card red">
                        <div class="stat-label">🩺 ANC Records</div>
                        <div class="stat-value">${data.total_anc_records}</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="info-section">
                        <h2>🏥 Pregnancy & Maternal Health</h2>
                        <ul class="info-list">
                            <li>
                                <span class="label">Total ANC Records</span>
                                <span class="value">${data.total_anc_records}</span>
                            </li>
                            <li>
                                <span class="label">High Risk Pregnancies</span>
                                <span class="value">${data.high_risk_pregnancies}</span>
                            </li>
                            <li>
                                <span class="label">Family Planning Records</span>
                                <span class="value">${data.total_fp_records}</span>
                            </li>
                            <li>
                                <span class="label">Active FP Methods</span>
                                <span class="value">${data.fp_active}</span>
                            </li>
                        </ul>
                    </div>

                    <div class="info-section">
                        <h2>💉 Child Health & Vaccination</h2>
                        <ul class="info-list">
                            <li>
                                <span class="label">Total Children</span>
                                <span class="value">${data.total_children}</span>
                            </li>
                            <li>
                                <span class="label">Vaccines Given</span>
                                <span class="value">${data.vaccines_given}</span>
                            </li>
                            <li>
                                <span class="label">Vaccines Overdue</span>
                                <span class="value">${data.vaccines_overdue}</span>
                            </li>
                        </ul>
                    </div>

                    <div class="info-section">
                        <h2>🏠 Home Visits</h2>
                        <ul class="info-list">
                            <li>
                                <span class="label">Total Visits</span>
                                <span class="value">${data.total_visits}</span>
                            </li>
                            <li>
                                <span class="label">Completed Visits</span>
                                <span class="value">${data.visits_completed}</span>
                            </li>
                            <li>
                                <span class="label">Completion Rate</span>
                                <span class="value">${data.total_visits > 0 ? ((data.visits_completed / data.total_visits) * 100).toFixed(1) : 0}%</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
